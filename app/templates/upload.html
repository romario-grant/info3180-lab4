{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">File Upload</h1>

{% include 'flash_messages.html' %}

<form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
  {# This hidden field is required for Flask-WTF security #}
  {{ form.csrf_token }}

  <div class="form-group mb-3">
    {{ form.upload.label(class="form-label") }}
    {{ form.upload(class="form-control") }}
  </div>

  <button type="submit" name="submit" class="btn btn-primary">Upload file</button>
</form>
{% endblock %}
